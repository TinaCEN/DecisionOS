name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/decisionos-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/decisionos-web

jobs:
  # ── 1. Backend tests ────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DECISIONOS_SEED_ADMIN_USERNAME: admin
          DECISIONOS_SEED_ADMIN_PASSWORD: ci-test-password

  # ── 2. Frontend type-check + build ─────────────────────────────────────────
  test-frontend:
    name: Frontend type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit --project frontend/tsconfig.json

      - name: Build
        run: pnpm build:web
        env:
          API_INTERNAL_URL: http://api:8000

  # ── 3. Build & push Docker images (main branch only) ───────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            API_INTERNAL_URL=http://api:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max
