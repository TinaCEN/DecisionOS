services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      LLM_MODE: ${LLM_MODE:-mock}
      DECISIONOS_DB_PATH: ${DECISIONOS_DB_PATH:-/data/decisionos.db}
      DECISIONOS_SECRET_KEY: ${DECISIONOS_SECRET_KEY:-decisionos-dev-secret-change-me}
      DECISIONOS_CORS_ORIGINS: ${DECISIONOS_CORS_ORIGINS:-http://localhost:3000}
      # REQUIRED: Admin credentials must be set, no defaults
      DECISIONOS_SEED_ADMIN_USERNAME: ${DECISIONOS_SEED_ADMIN_USERNAME:?Admin username is required. Set DECISIONOS_SEED_ADMIN_USERNAME env variable.}
      DECISIONOS_SEED_ADMIN_PASSWORD: ${DECISIONOS_SEED_ADMIN_PASSWORD:?Admin password is required. Set DECISIONOS_SEED_ADMIN_PASSWORD env variable.}
    volumes:
      - decisionos_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  decisionos_data:
