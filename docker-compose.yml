services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      LLM_MODE: ${LLM_MODE:-mock}
      DECISIONOS_DB_PATH: ${DECISIONOS_DB_PATH:-/data/decisionos.db}
      DECISIONOS_SECRET_KEY: ${DECISIONOS_SECRET_KEY:-decisionos-dev-secret-change-me}
      DECISIONOS_CORS_ORIGINS: ${DECISIONOS_CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - decisionos_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  decisionos_data:
